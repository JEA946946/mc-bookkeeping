name: Deploy to production

# Builds the frontend, ships frontend + backend to the server over SSH,
# rebuilds the backend container, and runs migrations.
#
# Required repo secrets:
#   DEPLOY_SSH_KEY  — private key whose public key is in the server's root authorized_keys
#   DEPLOY_HOST     — server hostname/IP (e.g. 144.76.60.47)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy backend code
        run: |
          rsync -az --delete \
            --exclude 'media/' --exclude 'staticfiles/' \
            --exclude '__pycache__/' --exclude '*.pyc' \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            backend/ root@${{ secrets.DEPLOY_HOST }}:/opt/dmc-bookkeeping/backend/

      - name: Deploy frontend build
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            frontend/dist/ root@${{ secrets.DEPLOY_HOST }}:/opt/dmc-bookkeeping/frontend/dist/

      - name: Rebuild backend container + migrate
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes root@${{ secrets.DEPLOY_HOST }} \
            'cd /opt/dmc-bookkeeping && docker compose -f docker-compose.server.yml up -d --build'

      - name: Health check
        run: |
          sleep 15
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://bookkeeping.vmmorocco.com/api/v1/bills || true)
            echo "attempt $i: backend HTTP $code"
            if [ "$code" = "401" ] || [ "$code" = "200" ]; then echo "backend healthy"; exit 0; fi
            sleep 5
          done
          echo "backend health check failed"; exit 1
